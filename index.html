<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>szabi0243 - Verified Certifications</title>
    <style>
        :root {
            --bg-dark: #11141a;
            --card-bg: #1a1f29;
            --accent: #e2b755;
            --text-main: #f0f4f8;
            --text-muted: #94a3b8;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        header {
            max-width: 1100px;
            margin: 0 auto;
            padding: 4rem 2rem 2rem 2rem;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            letter-spacing: -0.05em;
        }

        h1 span {
            color: var(--accent);
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
            max-width: 600px;
            margin: 0 auto;
        }

        main {
            max-width: 1100px;
            margin: 0 auto;
            padding: 2rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 2rem;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: transform 0.2s ease, border-color 0.2s ease;
        }

        .card:hover {
            transform: translateY(-4px);
            border-color: var(--accent);
        }

        .card-content {
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .badge {
            align-self: flex-start;
            background-color: rgba(226, 183, 85, 0.1);
            color: var(--accent);
            padding: 0.25rem 0.75rem;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 1rem;
            text-transform: uppercase;
        }

        .card h2 {
            font-size: 1.3rem;
            margin: 0 0 0.5rem 0;
        }

        .meta {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 1rem;
        }

        .topics {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
            margin-bottom: 1.5rem;
            flex-grow: 1;
        }

        .topic-tag {
            background-color: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
            font-size: 0.75rem;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
        }

        .btn {
            display: block;
            text-align: center;
            background-color: var(--accent);
            color: #000;
            text-decoration: none;
            font-weight: 600;
            padding: 0.75rem;
            border-radius: 6px;
            transition: opacity 0.2s ease;
        }

        .btn:hover {
            opacity: 0.9;
        }

        footer {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-muted);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <header>
        <h1><span>szabi0243</span> // Continuous Learning</h1>
        <p class="subtitle">A verified repository of professional software engineering certifications and architecture milestones.</p>
    </header>

    <main>
        <div class="grid" id="certs-grid">
            </div>
    </main>

    <footer>
        <p>&copy; 2026 szabi0243. Built to scale.</p>
    </footer>

    <script>
        const certifications = [
            {
                title: "Learn Git",
                platform: "Boot.dev",
                date: "June 29, 2026",
                id: "bea8605f-02df-47ef-9bb0-e72d6698d710",
                image: "bootdev learn git.png",
                topics: ["Version Control", "Git Internals", "Branching & Merging", "Rebasing", "Remotes"]
            },
            {
                title: "Build a Bookbot in Python",
                platform: "Boot.dev (Project)",
                date: "June 28, 2026",
                id: "99298aab-3741-4506-a606-d52c163794f5",
                image: "bootdev build a bookbot in python.png",
                topics: ["File I/O", "Text Processing", "String Manipulation", "Data Analysis", "CLI Arguments"]
            },
            {
                title: "Learn Linux",
                platform: "Boot.dev",
                date: "June 26, 2026",
                id: "bfc69e97-3590-4e61-857d-bea7370dc4ce",
                image: "Learn Linux bootdev Cert.png",
                topics: ["CLI", "Shell Scripting", "File Systems", "Permissions & Security", "I/O Piping"]
            },
            {
                title: "Introduction to Python Course",
                platform: "Boot.dev",
                date: "June 21, 2026",
                id: "cade9be6-5bb1-4e23-9807-6e5e353a8844",
                image: "Introduction To Python bootdev course.png",
                topics: ["Functions & Scope", "Conditionals & Loops", "Data Structures", "Error Handling"]
            }
        ];

        function renderCertificates() {
            const grid = document.getElementById('certs-grid');
            grid.innerHTML = certifications.map(cert => `
                <div class="card">
                    <div class="card-content">
                        <span class="badge">${cert.platform}</span>
                        <h2>${cert.title}</h2>
                        <div class="meta">Completed: ${cert.date} <br> ID: ${cert.id.substring(0, 8)}...</div>
                        <div class="topics">
                            ${cert.topics.map(t => `<span class="topic-tag">${t}</span>`).join('')}
                        </div>
                        <a href="${cert.image}" target="_blank" class="btn">View Certificate Document</a>
                    </div>
                </div>
            `).join('');
        }

        renderCertificates();
    </script>
</body>
</html>
